<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escáner MCO - Asistencia</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F4FBF7; color: #1A3325; margin: 0; padding: 16px; display: flex; justify-content: center; }
    .wrap { max-width: 480px; width: 100%; }
    .card { background: #ffffff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,102,51,0.08); border: 1px solid #E6F5ED; }
    h1 { font-size: 22px; margin: 0 0 8px; color: #006633; text-align: center; }
    p { color: #456653; font-size: 14px; text-align: center; margin-bottom: 20px; }
    
    .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
    button { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; background: #006633; color: #fff; transition: background 0.2s; }
    button:hover { background: #004d26; }
    .btn-secondary { background: transparent; border: 2px solid #006633; color: #006633; }
    .btn-secondary:hover { background: #E6F5ED; }

    #reader { width: 100%; margin: 18px 0; border-radius: 12px; overflow: hidden; background: #000; }
    .status { margin-top: 15px; padding: 14px; border-radius: 10px; background: #E6F5ED; color: #004d26; font-size: 15px; text-align: center; font-weight: 600; }
    .danger { background: #FFEBEE !important; color: #C62828 !important; }
    .ok { background: #E8F5E9 !important; color: #2E7D32 !important; }
    .warn { background: #FFF3E0 !important; color: #EF6C00 !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 id="titulo-escaner">Escáner MCO</h1>
      <p id="info-escaner">Apunta con la cámara al código de barras del carné del alumno.</p>
      
      <div class="btn-group">
        <button id="btnStart" type="button" style="flex: 2;">📹 Activar cámara</button>
        <button id="btnVolver" type="button" class="btn-secondary" style="flex: 1;" onclick="volverAApp()">↩️ Volver</button>
      </div>

      <div id="reader"></div>
      <div id="status" class="status">Pulsa "Activar cámara" para iniciar.</div>
    </div>
  </div>

  <script>
    // ⚠️ REEMPLAZA ESTA URL CON LA DE TU GOOGLE APPS SCRIPT
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxixAfnF0rxP3Sh47MKAyyT8JJsLa3gRO4kbmEHrmbXLe4WxsfLEZjvIUn0Gp1Mi5Gf/exec';

    const urlParams = new URLSearchParams(window.location.search);
    const ctxGrupo = urlParams.get('grupo') || '';
    const ctxFecha = urlParams.get('fecha') || '';
    const ctxSesion = urlParams.get('sesion') || '';

    if(ctxGrupo) {
        document.getElementById('info-escaner').innerText = `Pasando lista para el Grupo ${ctxGrupo} (${ctxFecha})`;
    }

    let html5QrCode = null;
    let lastScan = { text: '', time: 0 };
    let isRegistering = false;

    function volverAApp() {
        stopScanner().then(() => {
            // Intenta cerrar la pestaña primero
            window.close();
            // Si el navegador bloquea el cierre por seguridad, redirige de vuelta a Apps Script
            setTimeout(() => {
                if (APPS_SCRIPT_URL && !APPS_SCRIPT_URL.includes('PEGA_AQUI')) {
                    window.location.href = APPS_SCRIPT_URL;
                } else {
                    alert("Cierra esta pestaña manualmente para volver a la app.");
                }
            }, 300);
        });
    }

    function setStatus(msg, type) { const el = document.getElementById('status'); el.textContent = msg; el.className = 'status ' + (type || ''); }
    function isDuplicate(text) { const now = Date.now(); if (lastScan.text === text && (now - lastScan.time) < 4000) return true; lastScan = { text, time: now }; return false; }
    
    async function stopScanner() {
      if (!html5QrCode) return;
      try { await html5QrCode.stop(); } catch(e) {}
      try { await html5QrCode.clear(); } catch(e) {}
      html5QrCode = null;
    }

    async function startScanner() {
      try {
        setStatus('Solicitando permiso de cámara...', 'warn');
        
        // 💡 LA SOLUCIÓN: Forzamos a iOS a enumerar las cámaras primero. 
        // Esto destraba los permisos en la primera pulsación.
        await Html5Qrcode.getCameras();
        
        await stopScanner();
        html5QrCode = new Html5Qrcode('reader');
        
        await html5QrCode.start( 
            { facingMode: 'environment' }, 
            { fps: 10, qrbox: { width: 280, height: 140 } }, 
            onScanSuccess, 
            function(){} // Función vacía para ignorar los fallos de fotogramas sin código
        );
        setStatus('Escaneando... enfoca el código.', 'ok');
      } catch (error) { 
        setStatus('Error de cámara. Asegúrate de dar permisos.', 'danger'); 
      }
    }

    function registrarPorJsonp(id) {
      return new Promise((resolve, reject) => {
        const callbackName = 'qrCallback_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
        const script = document.createElement('script');
        const timeout = setTimeout(() => { cleanup(); reject(new Error('Tiempo de espera agotado al registrar.')); }, 12000);

        function cleanup() { clearTimeout(timeout); if (script.parentNode) script.parentNode.removeChild(script); delete window[callbackName]; }
        window[callbackName] = function(response) { cleanup(); resolve(response); };
        script.onerror = function() { cleanup(); reject(new Error('No se pudo contactar con Google Sheets. Verifica que has publicado una Nueva Implementación.')); };

        const sep = APPS_SCRIPT_URL.includes('?') ? '&' : '?';
        script.src = APPS_SCRIPT_URL + sep + 'page=registrar_jsonp&id=' + encodeURIComponent(id) + '&grupo=' + encodeURIComponent(ctxGrupo) + '&fecha=' + encodeURIComponent(ctxFecha) + '&sesion=' + encodeURIComponent(ctxSesion) + '&callback=' + encodeURIComponent(callbackName);

        document.body.appendChild(script);
      });
    }

    async function onScanSuccess(decodedText) {
      if (isRegistering || isDuplicate(decodedText)) return;
      isRegistering = true;
      const id = decodedText.trim();
      setStatus('Código detectado: ' + id + '. Guardando en servidor...', 'warn');
      await stopScanner();

      try {
        const response = await registrarPorJsonp(id);
        if (response && response.exito) {
          setStatus(`✅ ¡Asiste registrado!\n${response.nombre}`, 'ok'); playBeep();
        } else { setStatus((response && response.mensaje) || 'No se pudo registrar.', 'danger'); }
      } catch (error) { setStatus(error.message || 'Error al registrar.', 'danger'); }

      isRegistering = false;
      setTimeout(() => { startScanner(); }, 1800);
    }

    function playBeep() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1); } catch(e) {} }

    document.getElementById('btnStart').addEventListener('click', startScanner);
    window.addEventListener('beforeunload', function(){ stopScanner(); });
  </script>
</body>
</html>
