<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escáner MCO - Asistencia</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F4FBF7; color: #1A3325; margin: 0; padding: 16px; display: flex; justify-content: center; }
    .wrap { max-width: 480px; width: 100%; }
    .card { background: #ffffff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,102,51,0.08); border: 1px solid #E6F5ED; }
    h1 { font-size: 22px; margin: 0 0 8px; color: #006633; text-align: center; }
    p { color: #456653; font-size: 14px; text-align: center; margin-bottom: 20px; }
    button { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; background: #006633; color: #fff; transition: background 0.2s; }
    button:hover { background: #004d26; }
    #reader { width: 100%; margin: 18px 0; border-radius: 12px; overflow: hidden; background: #000; }
    .status { margin-top: 15px; padding: 14px; border-radius: 10px; background: #E6F5ED; color: #004d26; font-size: 15px; text-align: center; font-weight: 600; }
    .danger { background: #FFEBEE !important; color: #C62828 !important; }
    .ok { background: #E8F5E9 !important; color: #2E7D32 !important; }
    .warn { background: #FFF3E0 !important; color: #EF6C00 !important; }
    .counter-box { margin-top: 15px; text-align: center; font-size: 18px; font-weight: bold; color: #006633; padding: 10px; border: 2px dashed #00994D; border-radius: 10px; background: #F9FFF6; }
    .counter-number { font-size: 24px; color: #2E7D32; }
    
    /* Botón Volver */
    .btn-volver { margin-top: 15px; background: #E6F5ED; color: #006633; border: 2px solid #006633; }
    .btn-volver:hover { background: #D1E6DA; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Escáner MCO</h1>
      <p>Apunta al código del alumno.</p>
      
      <button id="btnStart" type="button">📹 Activar cámara</button>
      <div id="reader"></div>
      
      <div class="counter-box">
        Registrados ahora: <span id="scan-count" class="counter-number">0</span>
      </div>

      <div id="status" class="status">Pulsa "Activar cámara" para iniciar.</div>

      <!-- NUEVO BOTÓN VOLVER -->
      <button type="button" class="btn-volver" onclick="cerrarPestana()">🔙 Volver a la App</button>
    </div>
  </div>

  <script>
    // ⚠️ REEMPLAZA ESTA URL CON LA TUYA DE APPS SCRIPT
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxixAfnF0rxP3Sh47MKAyyT8JJsLa3gRO4kbmEHrmbXLe4WxsfLEZjvIUn0Gp1Mi5Gf/exec';

    let html5QrCode = null;
    let lastScan = { text: '', time: 0 };
    let isRegistering = false;
    let scanCount = 0; 

    const urlParams = new URLSearchParams(window.location.search);
    const paramGrupo = urlParams.get('grupo') || '';
    const paramFecha = urlParams.get('fecha') || '';
    const paramSesion = urlParams.get('sesion') || '';

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + (type || '');
    }

    function isDuplicate(text) {
      const now = Date.now();
      if (lastScan.text === text && (now - lastScan.time) < 4000) return true;
      lastScan = { text, time: now };
      return false;
    }

    async function stopScanner() {
      if (!html5QrCode) return;
      try { await html5QrCode.stop(); } catch(e) {}
      try { await html5QrCode.clear(); } catch(e) {}
      html5QrCode = null;
    }

    async function startScanner() {
      try {
        setStatus('Solicitando permiso de cámara...', 'warn');
        await Html5Qrcode.getCameras(); 
        await stopScanner();
        html5QrCode = new Html5Qrcode('reader');
        
        await html5QrCode.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 280, height: 140 } },
          onScanSuccess,
          function(){}
        );
        setStatus('Escaneando... enfoca el código.', 'ok');
      } catch (error) {
        setStatus('Error de cámara. Asegúrate de dar permisos.', 'danger');
      }
    }

    function registrarPorJsonp(id) {
      return new Promise((resolve, reject) => {
        const callbackName = 'qrCallback_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
        const script = document.createElement('script');
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('Tiempo de espera agotado al registrar.'));
        }, 12000);

        function cleanup() {
          clearTimeout(timeout);
          if (script.parentNode) script.parentNode.removeChild(script);
          delete window[callbackName];
        }

        window[callbackName] = function(response) {
          cleanup();
          resolve(response);
        };
        script.onerror = function() { cleanup(); reject(new Error('No se pudo contactar con Google Sheets.')); };

        script.src = APPS_SCRIPT_URL +
          '?page=registrar_jsonp' +
          '&id=' + encodeURIComponent(id) +
          '&grupo=' + encodeURIComponent(paramGrupo) +
          '&fecha=' + encodeURIComponent(paramFecha) +
          '&sesion=' + encodeURIComponent(paramSesion) +
          '&callback=' + encodeURIComponent(callbackName);

        document.body.appendChild(script);
      });
    }

    async function onScanSuccess(decodedText) {
      if (isRegistering || isDuplicate(decodedText)) return;
      isRegistering = true;
      const id = decodedText.trim();
      setStatus('Código detectado. Registrando...', 'warn');
      await stopScanner();

      try {
        const response = await registrarPorJsonp(id);
        if (response && response.exito) {
          setStatus(`✅ ¡Asiste registrado!\n${response.nombre}`, 'ok');
          scanCount++; 
          document.getElementById('scan-count').innerText = scanCount; 
          playBeep();
        } else {
          setStatus((response && response.mensaje) || 'No se pudo registrar.', 'danger');
        }
      } catch (error) {
        setStatus(error.message || 'Error al registrar.', 'danger');
      }

      isRegistering = false;
      setTimeout(() => { startScanner(); }, 1800);
    }

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1);
      } catch(e) {}
    }

    function cerrarPestana() {
      // Intenta cerrar la pestaña
      window.close();
      
      // Si a los 500ms sigue abierta (Safari a veces bloquea el cierre), avisa al usuario
      setTimeout(() => {
        alert("En tu iPhone, debes cerrar esta pestaña manualmente desde el gestor de pestañas (los dos cuadrados superpuestos abajo a la derecha) para volver a la app de MCO.");
      }, 500);
    }

    document.getElementById('btnStart').addEventListener('click', startScanner);
    window.addEventListener('beforeunload', function(){ stopScanner(); });
  </script>
</body>
</html>
